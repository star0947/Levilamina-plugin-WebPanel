name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Get latest LeviLamina SDK download URL (Windows)
      id: get-url-win
      run: |
        $url = (Invoke-RestMethod -Uri "https://api.github.com/repos/LiteLDev/LeviLamina/releases/latest").assets | Where-Object { $_.name -like "*windows*x64*.zip" } | Select-Object -First 1 -ExpandProperty browser_download_url
        echo "url=$url" >> $env:GITHUB_OUTPUT

    - name: Download SDK
      run: |
        curl -L -o sdk.zip "${{ steps.get-url-win.outputs.url }}"
        7z x sdk.zip -o./sdk

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Get latest LeviLamina SDK download URL (Linux)
      id: get-url-linux
      run: |
        URL=$(curl -s https://api.github.com/repos/LiteLDev/LeviLamina/releases/latest | jq -r '.assets[] | select(.name | contains("linux") and endswith(".tar.xz")) | .browser_download_url')
        echo "url=$URL" >> $GITHUB_OUTPUT

    - name: Download SDK
      run: |
        curl -L -o sdk.tar.xz "${{ steps.get-url-linux.outputs.url }}"
        mkdir sdk
        tar -xf sdk.tar.xz -C sdk

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload SO artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Linux
        path: build/linux/x86_64/release/libWebPanel.so