name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install xmake (via official script)
      run: |
        Invoke-Expression (Invoke-Webrequest 'https://xmake.io/psget.text' -UseBasicParsing).Content

    - name: Build plugin
      run: |
        xmake f -y -m release
        xmake

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll