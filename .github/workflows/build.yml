name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    # 🎯 使用专用 Action 自动下载并解压 Windows SDK
    - name: Download & Extract LeviLamina SDK (Windows)
      uses: robinraju/release-downloader@v1.12
      with:
        repository: "LiteLDev/LeviLamina"
        latest: true
        fileName: "*-windows-x64*.zip"
        out-file-path: "sdk"
        extract: true

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    # 🎯 使用专用 Action 自动下载并解压 Linux SDK
    - name: Download & Extract LeviLamina SDK (Linux)
      uses: robinraju/release-downloader@v1.12
      with:
        repository: "LiteLDev/LeviLamina"
        latest: true
        fileName: "*-linux-x64*.tar.xz"
        out-file-path: "sdk"
        extract: true

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload SO artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Linux
        path: build/linux/x86_64/release/libWebPanel.so