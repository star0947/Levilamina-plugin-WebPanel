name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download and install xmake
      run: |
        $url = "https://github.com/xmake-io/xmake/releases/latest/download/xmake-v3.0.8.win64.exe"
        $installer = "$env:TEMP\xmake-installer.exe"
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
        Start-Process -FilePath $installer -ArgumentList "/S" -Wait -NoNewWindow

    - name: Add xmake to PATH
      run: |
        echo "C:\Program Files\xmake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Verify xmake
      run: xmake --version

    - name: Build plugin
      run: |
        xmake f -y -m release
        xmake

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll