name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Download LeviLamina SDK (Windows)
      run: |
        curl -L -o levilamina-sdk.zip https://github.com/LiteLDev/LeviLamina/releases/download/26.10.6/levilamina-sdk-windows-x64.zip
        7z x levilamina-sdk.zip -o./sdk

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Download LeviLamina SDK (Linux)
      run: |
        curl -L -o levilamina-sdk.tar.xz https://github.com/LiteLDev/LeviLamina/releases/download/26.10.6/levilamina-sdk-linux-x64.tar.xz
        mkdir sdk
        tar -xf levilamina-sdk.tar.xz -C sdk

    - name: Configure and Build
      run: |
        xmake f -m release --sdk=./sdk
        xmake

    - name: Upload SO artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Linux
        path: build/linux/x86_64/release/libWebPanel.so