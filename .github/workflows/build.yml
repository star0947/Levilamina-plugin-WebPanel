name: Build WebPanel Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Build plugin
      run: |
        xmake f -y -m release
        xmake

    - name: Upload DLL
      uses: actions/upload-artifact@v7
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll