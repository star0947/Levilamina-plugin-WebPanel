name: Build Plugin

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  XMAKE_GLOBALDIR: ${{ github.workspace }}/.xmake-global

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Configure Git for Actions (Windows)
      run: |
        git config --global http.sslVerify false
        git config --global http.postBuffer 524288000
        git config --global url."https://github.com/".insteadOf git@github.com:

    - name: Configure xmake to retry
      run: |
        xmake g --network=public
        xmake g --proxy=

    - name: Clean cache and build
      run: |
        xmake f -c
        xmake f -m release -y
        xmake -y

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Windows
        path: build/windows/x64/release/WebPanel.dll

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1

    - name: Configure Git for Actions (Linux)
      run: |
        git config --global http.sslVerify false
        git config --global http.postBuffer 524288000
        git config --global url."https://github.com/".insteadOf git@github.com:

    - name: Configure xmake to retry
      run: |
        xmake g --network=public
        xmake g --proxy=

    - name: Clean cache and build
      run: |
        xmake f -c
        xmake f -m release -y
        xmake -y

    - name: Upload SO
      uses: actions/upload-artifact@v4
      with:
        name: WebPanel-Linux
        path: build/linux/x86_64/release/WebPanel.so